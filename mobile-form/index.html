<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DawgChat Log</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #e94560;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #c0c0c0;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: #e94560;
        }

        select option {
            background: #16213e;
            color: #e0e0e0;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        .field {
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #e94560;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            font-size: 0.95rem;
            min-height: 24px;
        }

        .status.success {
            color: #4ecca3;
        }

        .status.error {
            color: #e94560;
        }

        .status.loading {
            color: #f0c040;
        }

        /* PIN gate */
        #pinGate {
            text-align: center;
            margin-top: 80px;
        }

        #pinGate h2 {
            color: #e94560;
            margin-bottom: 12px;
        }

        #pinGate input {
            width: 160px;
            text-align: center;
            padding: 12px;
            font-size: 1.4rem;
            letter-spacing: 8px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #16213e;
            color: #e0e0e0;
            outline: none;
        }

        #pinGate input:focus {
            border-color: #e94560;
        }

        #pinError {
            color: #e94560;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- PIN gate -->
        <div id="pinGate">
            <h2>🔒 DawgChat</h2>
            <p style="color:#888; margin-bottom:16px;">Enter PIN to continue</p>
            <input type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
            <p id="pinError"></p>
        </div>

        <!-- Main form (hidden until PIN is correct) -->
        <div id="mainApp" class="hidden">
        <h1>🐾 DawgChat</h1>
        <p class="subtitle">Log a resident conversation</p>

        <form id="chatForm">
            <div class="field">
                <label for="residentName">Resident Name</label>
                <select id="residentName" name="residentName" required>
                    <option value="" disabled selected>Select a resident...</option>
                    <option value="Davionee Williams">Davionee Williams</option>

                    <option value="Lee Mcelhenney">Lee Mcelhenney</option>
                    <option value="Joseph Schrage">Joseph Schrage</option>
                    <option value="Sintayehu Jones">Sintayehu Jones</option>
                    <option value="Darren Chen">Darren Chen</option>
                    <option value="Khen Khup">Khen Khup</option>
                    <option value="Jack Conolly">Jack Conolly</option>
                    <option value="Reginald Moorman (Reggie)">Reginald Moorman (Reggie)</option>
                    <option value="Robert Morell(RJ)">Robert Morell (RJ)</option>
                    <option value="Austin Harris">Austin Harris</option>
                    <option value="William Holt(Will)">William Holt (Will)</option>
                    <option value="Caleb Vang">Caleb Vang</option>
                    <option value="Ryan Miller">Ryan Miller</option>
                    <option value="Patrick Deighan">Patrick Deighan</option>
                    <option value="Benjamin Githanga">Benjamin Githanga</option>
                    <option value="Jamal-Jadon Ogbidi">Jamal-Jadon Ogbidi</option>
                    <option value="Jason Lyons">Jason Lyons</option>
                    <option value="Kyle McDole">Kyle McDole</option>
                    <option value="Kaden Keiser">Kaden Keiser</option>
                    <option value="Christopher Hewatt (Jackson)">Christopher Hewatt (Jackson)</option>
                    <option value="Edmund Giering (Jake)">Edmund Giering (Jake)</option>
                    <option value="Charles Fennel (Charilie)">Charles Fennel (Charilie)</option>
                    <option value="Nicolas Behrens">Nicolas Behrens</option>
                    <option value="Krish Chinta">Krish Chinta</option>
                    <option value="Jack Douglas">Jack Douglas</option>
                    <option value="Jackson Hester">Jackson Hester</option>
                    <option value="Daniel Lu">Daniel Lu</option>
                    <option value="Anthony Wang">Anthony Wang</option>
                    <option value="Spencer Dobson">Spencer Dobson</option>
                    <option value="Alex Mahran-Galindo">Alex Mahran-Galindo</option>
                    <option value="Cayden Dykstra">Cayden Dykstra</option>
                    <option value="Ivan Ivanov">Ivan Ivanov</option>
                    <option value="Rowan Mathis">Rowan Mathis</option>
                    <option value="Logan Brown">Logan Brown</option>
                    <option value="Jordan Wolff">Jordan Wolff</option>
                    <option value="Jaylen O'Brien">Jaylen O'Brien</option>
                    <option value="Chidubem Ugboh(Andrew)">Chidubem Ugboh (Andrew)</option>
                    <option value="Ethan Kim">Ethan Kim</option>
                    <option value="Aidan McConnell">Aidan McConnell</option>
                    <option value="Mikhael Dahlen (Misha)">Mikhael Dahlen (Misha)</option>
                    <option value="Aidan Paul">Aidan Paul</option>
                    <option value="Nathel Mundackal">Nathel Mundackal</option>
                    <option value="Hugh Johnson">Hugh Johnson</option>
                    <option value="Donovan Howard">Donovan Howard</option>
                </select>
            </div>

            <div class="field">
                <label for="conversationSummary">Conversation Summary</label>
                <textarea
                    id="conversationSummary"
                    name="conversationSummary"
                    placeholder="Briefly describe what you talked about..."
                    required
                ></textarea>
            </div>

            <button type="submit" id="submitBtn">Submit Conversation</button>
        </form>

        <p class="status" id="statusMsg"></p>
        </div><!-- /mainApp -->
    </div>

    <script>
        // ============================================================
        // PIN GATE — change this to whatever 4-digit PIN you want
        // ============================================================
        const ACCESS_PIN = '6868';

        const pinGate = document.getElementById('pinGate');
        const mainApp = document.getElementById('mainApp');
        const pinInput = document.getElementById('pinInput');
        const pinError = document.getElementById('pinError');

        // Check if already authenticated
        if (localStorage.getItem('dawgchat_auth') === 'ok') {
            pinGate.classList.add('hidden');
            mainApp.classList.remove('hidden');
        }

        pinInput.addEventListener('input', () => {
            if (pinInput.value.length === 4) {
                if (pinInput.value === ACCESS_PIN) {
                    localStorage.setItem('dawgchat_auth', 'ok');
                    pinGate.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                } else {
                    pinError.textContent = 'Wrong PIN';
                    pinInput.value = '';
                }
            }
        });
        // ============================================================
        // CONFIGURATION — Replace this URL with your Activepieces
        // webhook URL after you create the flow.
        // ============================================================
        const WEBHOOK_URL = 'https://cloud.activepieces.com/api/v1/webhooks/yDfWVa5nNBEYlDb4kI7nB';

        const form = document.getElementById('chatForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const residentName = document.getElementById('residentName').value.trim();
            const conversationSummary = document.getElementById('conversationSummary').value.trim();

            if (!residentName || !conversationSummary) {
                statusMsg.textContent = 'Please fill in both fields.';
                statusMsg.className = 'status error';
                return;
            }

            // Prevent double-submit
            submitBtn.disabled = true;
            statusMsg.textContent = 'Submitting...';
            statusMsg.className = 'status loading';

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        residentName: residentName,
                        conversationSummary: conversationSummary
                    })
                });

                statusMsg.textContent = '✓ Submitted successfully!';
                statusMsg.className = 'status success';
                form.reset();
            } catch (err) {
                statusMsg.textContent = 'Error submitting. Please try again.';
                statusMsg.className = 'status error';
                console.error('Submission error:', err);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
